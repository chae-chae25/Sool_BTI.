<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>술BTI 검사</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root{
      --bg1:#0d1020; --bg2:#121938; --card:#171d38; --card2:#222a4d;
      --text:#f5f7ff; --muted:#bcc4e6; --accent1:#9aa7ff; --accent2:#c18dff;
      --danger:#ff8c8c; --ok:#89d7b7; --radius:20px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2) 60%, #0f1530);
      min-height:100vh;
    }
    .wrap{max-width:900px; margin:0 auto; padding:20px 16px 56px}
    .card{
      background:rgba(23,29,56,.94);
      border:1px solid rgba(255,255,255,.06);
      border-radius:var(--radius);
      box-shadow:0 14px 35px rgba(0,0,0,.26);
    }
    .hero{padding:24px 20px; margin-bottom:16px}
    h1{margin:0 0 8px; font-size:32px}
    .sub{margin:0; color:var(--muted); font-size:18px}
    .chips{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px}
    .chip{
      padding:10px 14px; border-radius:999px; background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07); color:#e7ebff; font-size:15px;
    }
    .sticky{
      position:sticky; top:0; z-index:10; margin-bottom:14px; padding:12px 14px;
      background:rgba(10,14,31,.75); backdrop-filter:blur(8px); border-radius:18px;
      border:1px solid rgba(255,255,255,.06);
    }
    .progress-text{font-size:16px; color:var(--muted); margin-bottom:10px}
    .progress{width:100%; height:12px; background:#2a3054; border-radius:999px; overflow:hidden}
    .bar{height:100%; width:0%; background:linear-gradient(90deg,var(--accent1),var(--accent2)); transition:width .25s}
    .qcard{padding:18px; margin:14px 0}
    .qno{font-size:14px; color:#cdd5fb; margin-bottom:8px}
    .qtext{font-size:22px; font-weight:800; margin-bottom:14px; line-height:1.4}
    .choices{display:grid; gap:10px}
    .choice{display:block; cursor:pointer}
    .choice input{display:none}
    .choice span{
      display:block; padding:14px; border-radius:14px; background:var(--card2);
      border:1px solid rgba(255,255,255,.07); font-size:17px; transition:.15s;
    }
    .choice input:checked + span{
      background:linear-gradient(180deg, rgba(154,167,255,.22), rgba(193,141,255,.22));
      border-color:rgba(193,141,255,.55); transform:translateY(-1px);
    }
    .actions{padding:18px; margin-top:16px}
    .btnrow{display:flex; gap:10px; flex-wrap:wrap}
    button{
      border:0; border-radius:14px; padding:14px 16px; font-size:17px; font-weight:800; cursor:pointer;
    }
    .primary{background:linear-gradient(90deg,var(--accent1),var(--accent2)); color:white}
    .secondary{background:#2a3158; color:white}
    .warn{display:none; color:var(--danger); font-weight:800; margin-top:10px}
    .result{display:none; margin-top:18px}
    .result-card{padding:22px}
    .badge{
      display:inline-block; padding:8px 12px; border-radius:999px;
      background:rgba(193,141,255,.14); border:1px solid rgba(193,141,255,.28); color:#f0e3ff; font-size:13px;
      margin-bottom:10px;
    }
    .code{font-size:46px; font-weight:900; margin:0}
    .oneline{font-size:20px; font-weight:800; margin:10px 0 0}
    .section{
      margin-top:16px; padding:16px; border-radius:16px; background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06); white-space:pre-line;
    }
    .section-title{font-weight:900; font-size:18px; margin-bottom:8px}
    .axis-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px}
    .axis{
      padding:14px; border-radius:16px; background:var(--card2); border:1px solid rgba(255,255,255,.06);
    }
    .axis-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
    .axis-name{color:var(--muted); font-size:14px}
    .axis-letter{font-size:22px; font-weight:900}
    .axis-row{display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px}
    .meter{height:12px; background:#31385f; border-radius:999px; overflow:hidden}
    .fill{height:100%; background:linear-gradient(90deg,var(--accent1),var(--accent2))}
    .axis-desc{font-size:13px; color:#dbe1ff; margin-top:8px; line-height:1.4}
    .footer{margin-top:14px; color:var(--muted); font-size:13px}
    .small-input{
      width:100%; margin-top:8px; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.08);
      background:#283056; color:white; font-size:16px;
    }
    @media (max-width:640px){
      h1{font-size:28px}
      .sub{font-size:16px}
      .qtext{font-size:19px}
      .axis-grid{grid-template-columns:1fr}
      .code{font-size:38px}
      .oneline{font-size:18px}
      .btnrow button{flex:1 1 calc(50% - 10px)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card hero">
      <h1>🍻 술BTI 검사</h1>
      <p class="sub">MBTI처럼 체크해서 나의 술 스타일을 알아보는 테스트</p>
      <div class="chips">
        <div class="chip">주종(도수): High / Low</div>
        <div class="chip">속도: Fast / Slow</div>
        <div class="chip">목적: Drink / Vibe</div>
        <div class="chip">조절: J(지성) / M(무지성)</div>
      </div>
    </section>

    <div class="sticky">
      <div class="progress-text"><span id="answered">0</span>/22 문항 응답</div>
      <div class="progress"><div class="bar" id="bar"></div></div>
    </div>

    <form id="quiz"></form>

    <section class="card actions">
      <div class="btnrow">
        <button type="button" class="primary" id="calcBtn">결과 보기</button>
        <button type="button" class="secondary" id="resetBtn">초기화</button>
        <button type="button" class="secondary" id="copyBtn">결과 복사</button>
        <button type="button" class="secondary" id="shareBtn">공유</button>
      </div>
      <div class="warn" id="warn">모든 문항에 응답해야 결과를 볼 수 있어.</div>

      <div class="result" id="result">
        <div class="card result-card" id="captureCard">
          <div class="badge">오늘의 만취 자아 분석 결과</div>
          <p class="code" id="typeCode">HFDJ</p>
          <p class="oneline" id="oneLine"></p>

          <div class="section">
            <div class="section-title" id="memeTitle"></div>
            <div id="memeText"></div>
          </div>

          <div class="axis-grid">
            <div class="axis">
              <div class="axis-top"><div class="axis-name">주종(도수)</div><div class="axis-letter" id="axis1Letter"></div></div>
              <div class="axis-row"><span id="axis1Left"></span><span id="axis1Right"></span></div>
              <div class="meter"><div class="fill" id="axis1Fill"></div></div>
              <div class="axis-desc" id="axis1Desc"></div>
            </div>
            <div class="axis">
              <div class="axis-top"><div class="axis-name">속도</div><div class="axis-letter" id="axis2Letter"></div></div>
              <div class="axis-row"><span id="axis2Left"></span><span id="axis2Right"></span></div>
              <div class="meter"><div class="fill" id="axis2Fill"></div></div>
              <div class="axis-desc" id="axis2Desc"></div>
            </div>
            <div class="axis">
              <div class="axis-top"><div class="axis-name">목적</div><div class="axis-letter" id="axis3Letter"></div></div>
              <div class="axis-row"><span id="axis3Left"></span><span id="axis3Right"></span></div>
              <div class="meter"><div class="fill" id="axis3Fill"></div></div>
              <div class="axis-desc" id="axis3Desc"></div>
            </div>
            <div class="axis">
              <div class="axis-top"><div class="axis-name">조절</div><div class="axis-letter" id="axis4Letter"></div></div>
              <div class="axis-row"><span id="axis4Left"></span><span id="axis4Right"></span></div>
              <div class="meter"><div class="fill" id="axis4Fill"></div></div>
              <div class="axis-desc" id="axis4Desc"></div>
            </div>
          </div>

          <div class="section" id="detailBox"></div>
          <div class="section" id="bonusBox"></div>
          <div class="section" id="matchBox"></div>
          <div class="section">
            <div class="section-title">👥 친구 궁합 비교</div>
            <input id="friendType" class="small-input" placeholder="친구 술BTI 입력 (예: HFDM)">
            <div class="btnrow" style="margin-top:10px">
              <button type="button" class="secondary" id="compareBtn">궁합 비교</button>
              <button type="button" class="secondary" id="saveImgBtn">결과 이미지 저장</button>
            </div>
            <div id="compareResult" style="margin-top:10px;font-weight:800"></div>
          </div>

          <div class="footer" id="scoreFooter"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const questions = [
      { id:1, axis:"alcohol", dir:1, text:"술 고를 때 도수가 센 술이 더 끌린다." },
      { id:2, axis:"speed", dir:1, text:"잔이 비면 바로 채우고 싶다." },
      { id:3, axis:"purpose", dir:1, text:"술자리의 핵심은 결국 취하는 거라고 생각한다." },
      { id:4, axis:"control", dir:1, text:"술 마시기 전에 어느 정도 마실지 생각해둔다." },
      { id:5, axis:"alcohol", dir:1, text:"가볍게 한 잔보다는 확 취하는 게 더 낫다." },
      { id:6, axis:"speed", dir:1, text:"술 마시다 보면 나도 모르게 속도가 붙는다." },
      { id:7, axis:"purpose", dir:-1, text:"술보다 분위기나 대화가 더 중요하다." },
      { id:8, axis:"control", dir:-1, text:"분위기 타면 원래 계획보다 훨씬 더 마신다." },
      { id:9, axis:"alcohol", dir:1, text:"맥주 몇 잔보다 소주/위스키 몇 잔이 더 만족스럽다." },
      { id:10, axis:"speed", dir:-1, text:"한 잔을 오래 들고 있는 편이다." },
      { id:11, axis:"purpose", dir:1, text:"술이 약하면 좀 재미없다고 느낀다." },
      { id:12, axis:"control", dir:1, text:"취기가 올라와도 여기까지 하고 멈출 수 있다." },
      { id:13, axis:"alcohol", dir:1, text:"독한 술을 마셔도 크게 부담스럽지 않다." },
      { id:14, axis:"speed", dir:1, text:"템포 빠른 술자리가 더 재밌다." },
      { id:15, axis:"purpose", dir:1, text:"사람보다 술이 더 중요한 날도 있다." },
      { id:16, axis:"control", dir:-1, text:"술자리에서는 내 페이스보다 흐름을 따라간다." },
      { id:17, axis:"alcohol", dir:-1, text:"술은 편하게 마실 수 있는 게 제일 중요하다." },
      { id:18, axis:"speed", dir:1, text:"천천히 마시자는 말 들으면 좀 답답하다." },
      { id:19, axis:"purpose", dir:-1, text:"취하는 것보다 적당한 분위기가 더 좋다." },
      { id:20, axis:"control", dir:1, text:"다음 날 일정 생각하면 술을 조절하는 편이다." },
      { id:21, axis:"bonus", dir:0, text:"혼술을 좋아한다." },
      { id:22, axis:"bonus", dir:0, text:"술부심이 약간 있다." }
    ];

    const scale = [
      {label:"매우 그렇다", value:2},
      {label:"그렇다", value:1},
      {label:"모르겠다", value:0},
      {label:"아니다", value:-1},
      {label:"매우 아니다", value:-2},
    ];

    function shuffle(arr){
      const copy = [...arr];
      for(let i=copy.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const shuffled = shuffle(questions);
    const quiz = document.getElementById('quiz');
    const answered = document.getElementById('answered');
    const bar = document.getElementById('bar');
    const warn = document.getElementById('warn');
    const resultBox = document.getElementById('result');

    function renderQuestions(){
      quiz.innerHTML = shuffled.map((q, idx) => `
        <section class="card qcard">
          <div class="qno">Q${idx+1}</div>
          <div class="qtext">${q.text}</div>
          <div class="choices">
            ${scale.map(s => `
              <label class="choice">
                <input type="radio" name="q${q.id}" value="${s.value}">
                <span>${s.label}</span>
              </label>
            `).join('')}
          </div>
        </section>
      `).join('');
      quiz.addEventListener('change', updateProgress);
      updateProgress();
    }

    function updateProgress(){
      const count = questions.filter(q => document.querySelector(`input[name="q${q.id}"]:checked`)).length;
      answered.textContent = count;
      bar.style.width = `${(count/questions.length)*100}%`;
      if(count < questions.length) resultBox.style.display = 'none';
    }

    function computeScores(){
      const scores = { alcohol:0, speed:0, purpose:0, control:0 };
      for(const q of questions){
        const picked = document.querySelector(`input[name="q${q.id}"]:checked`);
        if(!picked) return null;
        if(q.axis !== 'bonus') scores[q.axis] += Number(picked.value) * q.dir;
      }
      return scores;
    }

    function axisLetter(score, pos, neg){ return score >= 0 ? pos : neg; }

    function axisPercents(score){
      const max = 10;
      const posPct = Math.round(((score + max) / (2*max)) * 100);
      const negPct = 100 - posPct;
      return {posPct, negPct};
    }

    function buildAxis(score, posLetter, negLetter, posName, negName, posDesc, negDesc){
      const {posPct, negPct} = axisPercents(score);
      const dominant = score >= 0 ? posLetter : negLetter;
      return {
        letter: dominant,
        left: `${posLetter} ${posPct}%`,
        right: `${negLetter} ${negPct}%`,
        fill: posPct,
        desc: dominant === posLetter
          ? `${posName} 쪽이 더 강해. ${posDesc}`
          : `${negName} 쪽이 더 강해. ${negDesc}`
      };
    }

    function getMeme(code){
      const map = {
        HFDJ:["회식 임원 재질","1차에서 이미 오늘의 페이스를 설계해둠.\n근데 설계 내용이 세게 마시기라서 무섭다."],
        HFDM:["오늘 기억 실종 예정","분위기보다 속도, 속도보다 취기.\n브레이크는 2차쯤 두고 온 타입."],
        HFVJ:["감성 위스키 실무형","센 술 좋아하는데 또 선은 지킴.\n취하긴 해도 민폐는 안 끼치려는 어른 타입."],
        HFVM:["분위기 타다 급발진","처음엔 감성 한 스푼이었는데\n정신 차리면 샷 추가하고 있음."],
        HSDJ:["조용한 하드캐리","말수는 적어도 잔은 안 늦음.\n천천히 마시는데 결국 제일 많이 마시는 타입."],
        HSDM:["은은한 만취 누적형","겉보기엔 멀쩡한데 내면에서 차곡차곡 쌓임.\n끝날 때쯤 갑자기 취기가 폭발한다."],
        HSVJ:["고도수 낭만파","독한 술도 무드 있게 즐김.\n잔은 느리지만 감정선은 깊다."],
        HSVM:["새벽 감성 폭주형","천천히 마시다가 새벽에 갑자기 인생 얘기 시작.\n그리고 다음 날 이불킥."],
        LFDJ:["합리적 달림러","가벼운 술로 오래 달리는 효율형.\n취기는 챙기되 리스크 관리도 함."],
        LFDM:["맥주 무한루프형","가벼워서 괜찮다며 계속 마심.\n누적의 무서움을 몸소 증명하는 타입."],
        LFVJ:["분위기 디렉터","사람, 텐션, 대화 다 챙기는 핵인싸형.\n술자리를 잘 굴러가게 만든다."],
        LFVM:["텐션 맡겨놓은 사람","처음엔 가볍게 시작했는데\n갑자기 노래방 예약까지 해버림."],
        LSDJ:["와인잔 든 현실주의자","천천히, 가볍게, 적당히.\n다음 날 컨디션까지 계산하는 안정형."],
        LSDM:["말랑한 흐름 탑승형","세게는 안 마시는데 분위기에 약함.\n기분 좋으면 집 가는 타이밍을 놓친다."],
        LSVJ:["소셜 감성 장인","술보다 분위기와 사람을 더 사랑하는 타입.\n사진도 잘 찍고 대화도 잘 이어간다."],
        LSVM:["잔 들고 수다 무한형","한 잔으로 세 시간 가능.\n근데 집은 제일 늦게 가는 타입."]
      };
      return map[code] || ["술자리 변수형","예측은 어렵지만 분명 어딘가 강렬한 타입."];
    }

    function getBestMatch(code){
      const map = {
        HFDJ:"LSVJ", HFDM:"LSDJ", HFVJ:"LSVM", HFVM:"LSDJ",
        HSDJ:"LFVJ", HSDM:"LFVJ", HSVJ:"LFVM", HSVM:"LFVJ",
        LFDJ:"HSVJ", LFDM:"HSDJ", LFVJ:"HSDJ", LFVM:"HSVJ",
        LSDJ:"HFDM", LSDM:"HFDM", LSVJ:"HFDJ", LSVM:"HFVJ"
      };
      return map[code] || "LSVJ";
    }

    function getWorstMatch(code){
      const map = {
        HFDJ:"LSVM", HFDM:"LSVJ", HFVJ:"LSDM", HFVM:"LSDJ",
        HSDJ:"LFDM", HSDM:"LFDJ", HSVJ:"LFDJ", HSVM:"LFDJ",
        LFDJ:"HSVM", LFDM:"HSDJ", LFVJ:"HFDM", LFVM:"HFDJ",
        LSDJ:"HFVM", LSDM:"HFVJ", LSVJ:"HFDM", LSVM:"HFDJ"
      };
      return map[code] || "HFDM";
    }

    function getRisk(code){
      if(code.includes('F') && code.includes('D') && code.includes('M')) return '🔴 사고 위험';
      if(code.includes('M')) return '🟡 주의 필요';
      return '🟢 안정적';
    }

    function getRarity(code){
      const map = {
        HFDJ:7, HFDM:5, HFVJ:9, HFVM:6, HSDJ:8, HSDM:6, HSVJ:10, HSVM:7,
        LFDJ:12, LFDM:11, LFVJ:15, LFVM:13, LSDJ:14, LSDM:10, LSVJ:17, LSVM:12
      };
      return map[code] || 10;
    }

    function getRole(code){
      const map = {
        HFDJ:'👑 회식 지휘관',
        HFDM:'🔥 폭주 기관차',
        HFVJ:'🥃 감성 위스키러',
        HFVM:'🎢 분위기 급발진러',
        HSDJ:'🧊 조용한 하드캐리',
        HSDM:'🌙 은은한 누적형',
        HSVJ:'🎻 고도수 낭만파',
        HSVM:'🌃 새벽 감성러',
        LFDJ:'⚙️ 합리적 달림러',
        LFDM:'🍺 무한 맥주러',
        LFVJ:'✨ 분위기 디렉터',
        LFVM:'🎤 텐션 폭주러',
        LSDJ:'🍷 현실주의자',
        LSDM:'🫠 말랑 흐름형',
        LSVJ:'📸 소셜 감성 장인',
        LSVM:'💬 수다 무한형'
      };
      return map[code] || '🍻 술자리 변수형';
    }

    function compareTypes(me, friend){
      if(!/^[HLSFVDJM]{4}$/.test(friend)) return '형식 맞춰서 입력해 (예: HFDM)';
      let score = 0;
      if(me[1] === friend[1]) score += 2;        // speed match
      if(me[2] !== friend[2]) score += 1;        // purpose complement
      if(me[3] !== friend[3]) score += 1;        // control complement
      if(me[0] !== friend[0]) score += 1;        // alcohol complement

      if(score >= 4) return `🔥 좋은 궁합 · ${friend}랑 같이 마시면 밸런스가 잘 맞는 편`;
      if(score >= 2) return `⚠️ 애매 · ${friend}랑은 맞는 부분도 있고 부딪히는 부분도 있음`;
      return `💀 최악 · ${friend}랑은 속도나 목적이 충돌할 확률이 높음`;
    }

    function buildResult(scores){
      const A = axisLetter(scores.alcohol, 'H', 'L');
      const S = axisLetter(scores.speed, 'F', 'S');
      const P = axisLetter(scores.purpose, 'D', 'V');
      const C = axisLetter(scores.control, 'J', 'M');
      const code = `${A}${S}${P}${C}`;
      const [memeTitle, memeText] = getMeme(code);

      return {
        code,
        memeTitle,
        memeText,
        oneLine: `${A === 'H' ? '독한 술 쪽' : '가벼운 술 쪽'} · ${S === 'F' ? '빠른 템포' : '느린 템포'} · ${P === 'D' ? '취기 중심' : '분위기 중심'} · ${C === 'J' ? '조절 가능' : '흐름 탑승'}`,
        axis1: buildAxis(scores.alcohol,'H','L','High','Low','도수 높은 술이나 확실한 취기를 선호하는 편.','부담 적고 편한 술을 더 선호하는 편.'),
        axis2: buildAxis(scores.speed,'F','S','Fast','Slow','술자리 템포가 붙을수록 신나는 편.','천천히 오래 마시는 쪽이 더 편한 편.'),
        axis3: buildAxis(scores.purpose,'D','V','Drink','Vibe','술 자체의 취기와 재미를 중시하는 편.','대화와 분위기, 감정선을 더 중시하는 편.'),
        axis4: buildAxis(scores.control,'J','M','J','M','선 넘기 전에 페이스 조절이 되는 편.','흐름 타면 브레이크가 잘 안 걸리는 편.'),
        detail: `${code} 해석\n\n너는 ${A === 'H' ? '도수 높은 술/확실한 취기' : '가볍고 편한 술'}를 선호하고,\n${S === 'F' ? '술자리 속도가 붙을수록 재밌어지는 편' : '천천히 오래 마시는 쪽이 더 편한 편'}이야.\n또 ${P === 'D' ? '술 자체의 재미와 취기' : '사람, 분위기, 감정선'}를 더 중요하게 보고,\n${C === 'J' ? '자기 페이스를 어느 정도 지키는 타입' : '분위기 타면 계획이 쉽게 무너지는 타입'}이야.`,
        best: getBestMatch(code),
        worst: getWorstMatch(code),
        risk: getRisk(code),
        rarity: getRarity(code),
        role: getRole(code),
        footer: `원점수 | 도수 ${scores.alcohol}, 속도 ${scores.speed}, 목적 ${scores.purpose}, 조절 ${scores.control}`
      };
    }

    function renderResult(result){
      document.getElementById('typeCode').textContent = result.code;
      document.getElementById('oneLine').textContent = result.oneLine;
      document.getElementById('memeTitle').textContent = result.memeTitle;
      document.getElementById('memeText').textContent = result.memeText;

      [['1', result.axis1], ['2', result.axis2], ['3', result.axis3], ['4', result.axis4]].forEach(([n, a])=>{
        document.getElementById(`axis${n}Letter`).textContent = a.letter;
        document.getElementById(`axis${n}Left`).textContent = a.left;
        document.getElementById(`axis${n}Right`).textContent = a.right;
        document.getElementById(`axis${n}Fill`).style.width = `${a.fill}%`;
        document.getElementById(`axis${n}Desc`).textContent = a.desc;
      });

      const q21 = Number(document.querySelector('input[name="q21"]:checked').value);
      const q22 = Number(document.querySelector('input[name="q22"]:checked').value);
      const bonus1 = q21 >= 1 ? '🍶 혼술 선호형' : q21 <= -1 ? '🍻 술자리형' : '🍶🍻 혼술/술자리 반반형';
      const bonus2 = q22 >= 1 ? '😎 술부심 있음' : q22 <= -1 ? '🙂 담백형 술러' : '😌 술부심 보통';

      document.getElementById('detailBox').textContent = result.detail;
      document.getElementById('bonusBox').textContent = `📌 추가 성향\n\n${bonus1}\n${bonus2}`;
      document.getElementById('matchBox').textContent =
        `🔥 최고의 술 궁합: ${result.best}\n👉 서로 부족한 부분을 채워주는 조합이라 같이 마시면 밸런스가 맞는 타입\n\n` +
        `💀 최악의 술 궁합: ${result.worst}\n👉 속도/목적 충돌로 분위기 깨질 확률이 높음\n\n` +
        `⚠️ 위험도: ${result.risk}\n` +
        `📊 희귀도: 상위 ${result.rarity}%\n` +
        `🎭 술자리 역할: ${result.role}`;

      document.getElementById('scoreFooter').textContent = result.footer;
      resultBox.style.display = 'block';
      resultBox.scrollIntoView({behavior:'smooth', block:'start'});
    }

    document.getElementById('calcBtn').addEventListener('click', ()=>{
      const scores = computeScores();
      if(!scores){
        warn.style.display = 'block';
        resultBox.style.display = 'none';
        return;
      }
      warn.style.display = 'none';
      renderResult(buildResult(scores));
    });

    document.getElementById('resetBtn').addEventListener('click', ()=>{
      document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);
      warn.style.display = 'none';
      resultBox.style.display = 'none';
      document.getElementById('compareResult').textContent = '';
      document.getElementById('friendType').value = '';
      updateProgress();
      window.scrollTo({top:0, behavior:'smooth'});
    });

    document.getElementById('copyBtn').addEventListener('click', async ()=>{
      const code = document.getElementById('typeCode').textContent;
      const text = resultBox.style.display === 'block'
        ? `내 술BTI는 ${code} 🍻\n${document.getElementById('memeTitle').textContent}\n${document.getElementById('oneLine').textContent}\n${document.getElementById('bonusBox').textContent.replace(/\n\n/g,"\n")}`
        : `술BTI 검사 해봐 🍻`;
      try{
        await navigator.clipboard.writeText(text);
        alert('복사했어!');
      }catch(e){
        alert('복사는 브라우저 환경에 따라 제한될 수 있어.');
      }
    });

    document.getElementById('shareBtn').addEventListener('click', async ()=>{
      const code = document.getElementById('typeCode').textContent;
      const text = resultBox.style.display === 'block'
        ? `내 술BTI는 ${code} 🍻 ${document.getElementById('memeTitle').textContent}`
        : `술BTI 검사 해봐 🍻`;
      if(navigator.share){
        try{ await navigator.share({title:'술BTI 검사', text}); }catch(e){}
      }else{
        alert('이 브라우저에서는 기본 공유 기능이 제한될 수 있어.');
      }
    });

    document.getElementById('compareBtn').addEventListener('click', ()=>{
      const me = document.getElementById('typeCode').textContent;
      if(resultBox.style.display !== 'block'){
        document.getElementById('compareResult').textContent = '먼저 내 결과를 계산해줘.';
        return;
      }
      const friend = document.getElementById('friendType').value.trim().toUpperCase();
      document.getElementById('compareResult').textContent = compareTypes(me, friend);
    });

    document.getElementById('saveImgBtn').addEventListener('click', async ()=>{
      if(resultBox.style.display !== 'block'){
        alert('먼저 결과를 계산해줘.');
        return;
      }
      try{
        const canvas = await html2canvas(document.getElementById('captureCard'), {backgroundColor:null, scale:2});
        const link = document.createElement('a');
        link.download = 'sool_bti_result.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }catch(e){
        alert('이미지 저장 중 오류가 생겼어.');
      }
    });

    renderQuestions();
  </script>
</body>
</html>
