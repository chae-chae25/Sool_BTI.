<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>술BTI 검사</title>
  <style>
    :root{
      --bg:#0f1221;
      --card:#171a2b;
      --card2:#1f2338;
      --text:#f4f6ff;
      --muted:#b8bed9;
      --accent:#8ea2ff;
      --accent2:#b58cff;
      --ok:#7fd1ae;
      --danger:#ff8c8c;
      --shadow:0 10px 30px rgba(0,0,0,.25);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,#0d1020,#161b33 60%,#0f1221);
      color:var(--text);
      min-height:100vh;
      line-height:1.5;
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:20px 16px 56px;
    }
    .hero,.card{
      background:rgba(23,26,43,.92);
      backdrop-filter: blur(8px);
      border:1px solid rgba(255,255,255,.06);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .hero{
      padding:24px 20px;
      margin-bottom:16px;
    }
    h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.2;
    }
    .sub{color:var(--muted); margin:0}
    .pillrow{
      display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;
    }
    .pill{
      padding:8px 12px; border-radius:999px; background:var(--card2);
      color:#dfe5ff; font-size:13px; border:1px solid rgba(255,255,255,.08);
    }
    .topbar{
      position:sticky; top:0; z-index:10; margin-bottom:14px;
      background:rgba(15,18,33,.7); backdrop-filter: blur(10px);
      border-radius:16px; padding:10px 12px;
      border:1px solid rgba(255,255,255,.06);
    }
    .progress-text{font-size:14px; color:var(--muted); margin-bottom:8px}
    .progress{
      width:100%; height:10px; border-radius:999px; background:#252a44; overflow:hidden;
    }
    .bar{
      width:0%; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
      transition:width .25s ease;
    }
    .card{padding:18px; margin:14px 0}
    .qno{
      font-size:13px; color:#c9d1ff; opacity:.85; margin-bottom:6px;
    }
    .qtext{
      font-size:20px; font-weight:700; margin-bottom:14px;
    }
    .choices{
      display:grid; grid-template-columns:1fr; gap:10px;
    }
    .choice{
      display:block; cursor:pointer;
    }
    .choice input{display:none}
    .choice span{
      display:block; padding:14px 14px; border-radius:14px; background:var(--card2);
      border:1px solid rgba(255,255,255,.08); color:#eef1ff; font-size:16px;
      transition:.18s ease;
    }
    .choice input:checked + span{
      border-color:rgba(181,140,255,.85);
      background:linear-gradient(180deg,rgba(142,162,255,.18),rgba(181,140,255,.18));
      transform:translateY(-1px);
    }
    .actions{
      display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;
    }
    button{
      border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700;
      cursor:pointer;
    }
    .primary{
      background:linear-gradient(90deg,var(--accent),var(--accent2)); color:white;
    }
    .secondary{
      background:#262c49; color:#eef1ff;
    }
    .result{
      display:none;
      margin-top:18px;
    }
    .code{
      font-size:42px; font-weight:800; letter-spacing:2px;
      margin:4px 0 6px;
    }
    .grid{
      display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px;
    }
    .mini{
      background:var(--card2); border-radius:14px; padding:14px;
      border:1px solid rgba(255,255,255,.06);
    }
    .mini .label{font-size:13px; color:var(--muted)}
    .mini .value{font-size:22px; font-weight:800; margin-top:4px}
    .desc{
      color:#dce2ff; white-space:pre-line;
    }
    .warn{color:var(--danger); font-weight:700; display:none; margin-top:10px}
    .footer{
      color:var(--muted); font-size:13px; margin-top:18px;
    }
    @media (max-width:640px){
      h1{font-size:26px}
      .qtext{font-size:18px}
      .grid{grid-template-columns:1fr}
      .code{font-size:36px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>🍻 술BTI 검사</h1>
      <p class="sub">MBTI처럼 체크해서 나의 술 스타일을 알아보는 테스트</p>
      <div class="pillrow">
        <div class="pill">주종(도수): High / Low</div>
        <div class="pill">속도: Fast / Slow</div>
        <div class="pill">목적: Drink / Vibe</div>
        <div class="pill">조절: J(지성) / M(무지성)</div>
      </div>
    </section>

    <div class="topbar">
      <div class="progress-text"><span id="answered">0</span>/20 문항 응답</div>
      <div class="progress"><div class="bar" id="bar"></div></div>
    </div>

    <form id="quiz"></form>

    <section class="card">
      <div class="actions">
        <button class="primary" type="button" id="calcBtn">결과 보기</button>
        <button class="secondary" type="button" id="resetBtn">초기화</button>
        <button class="secondary" type="button" id="copyBtn">결과 복사</button>
        <button class="secondary" type="button" id="shareBtn">공유</button>
      </div>
      <div class="warn" id="warn">모든 문항에 응답해야 결과를 볼 수 있어.</div>

      <div class="result" id="result">
        <p style="margin:0;color:var(--muted)">당신의 술BTI는</p>
        <div class="code" id="typeCode">HFDJ</div>
        <p id="oneLine" style="margin-top:0;font-size:18px;font-weight:700"></p>

        <div class="grid">
          <div class="mini"><div class="label">주종(도수)</div><div class="value" id="axis1"></div></div>
          <div class="mini"><div class="label">속도</div><div class="value" id="axis2"></div></div>
          <div class="mini"><div class="label">목적</div><div class="value" id="axis3"></div></div>
          <div class="mini"><div class="label">조절</div><div class="value" id="axis4"></div></div>
        </div>

        <div class="card" style="padding:16px;margin-top:14px">
          <div class="desc" id="detailDesc"></div>
        </div>

        <div class="footer" id="scoreFooter"></div>
      </div>
    </section>
  </div>

  <script>
    const questions = [
      { id: 1, axis: "alcohol", dir: 1, text: "나는 도수가 높은 술을 더 선호한다." },
      { id: 2, axis: "speed", dir: 1, text: "술을 마시면 속도가 점점 빨라지는 편이다." },
      { id: 3, axis: "purpose", dir: 1, text: "술자리의 가장 큰 목적은 취하는 것이다." },
      { id: 4, axis: "control", dir: 1, text: "술 마시기 전에 어느 정도 마실지 생각해둔다." },

      { id: 5, axis: "speed", dir: -1, text: "술은 천천히 오래 마시는 편이 더 좋다." },
      { id: 6, axis: "alcohol", dir: -1, text: "맥주나 칵테일처럼 가벼운 술이 더 편하다." },
      { id: 7, axis: "control", dir: -1, text: "분위기 타면 원래 계획보다 훨씬 더 마시게 된다." },
      { id: 8, axis: "purpose", dir: -1, text: "술맛보다 그날 분위기와 대화가 더 중요하다." },

      { id: 9, axis: "alcohol", dir: 1, text: "맥주보다 소주·위스키 같은 술이 더 끌린다." },
      { id: 10, axis: "purpose", dir: 1, text: "술이 약하면 좀 심심하다고 느낀다." },
      { id: 11, axis: "speed", dir: 1, text: "잔이 비면 빨리 다음 잔을 마시고 싶다." },
      { id: 12, axis: "control", dir: 1, text: "취기가 올라와도 스스로 멈출 수 있다." },

      { id: 13, axis: "purpose", dir: -1, text: "취하는 것보다 적당히 분위기만 타는 게 좋다." },
      { id: 14, axis: "alcohol", dir: 1, text: "가볍게 마시는 것보다 확 취하는 편이 낫다." },
      { id: 15, axis: "speed", dir: -1, text: "한 잔을 오래 들고 있는 편이다." },
      { id: 16, axis: "control", dir: -1, text: "술자리에서는 내 페이스보다 흐름을 더 따라가는 편이다." },

      { id: 17, axis: "speed", dir: 1, text: "템포 빠른 술자리가 더 신나고 재밌다." },
      { id: 18, axis: "purpose", dir: 1, text: "술자리에서 얼마나 마셨는지가 은근 중요하다." },
      { id: 19, axis: "alcohol", dir: -1, text: "독한 술보다는 부드럽고 마시기 쉬운 술이 좋다." },
      { id: 20, axis: "control", dir: 1, text: "다음 날 일정을 생각해서 술 양을 조절하는 편이다." }
    ];

    // shuffle once on load
    questions.sort(() => Math.random() - 0.5);

    const scale = [
      { label: "매우 그렇다", value: 2 },
      { label: "그렇다", value: 1 },
      { label: "모르겠다", value: 0 },
      { label: "아니다", value: -1 },
      { label: "매우 아니다", value: -2 }
    ];

    const quiz = document.getElementById("quiz");
    const answered = document.getElementById("answered");
    const bar = document.getElementById("bar");
    const warn = document.getElementById("warn");
    const resultBox = document.getElementById("result");

    function render() {
      quiz.innerHTML = questions.map((q, idx) => `
        <section class="card">
          <div class="qno">Q${idx + 1}</div>
          <div class="qtext">${q.text}</div>
          <div class="choices">
            ${scale.map(s => `
              <label class="choice">
                <input type="radio" name="q${q.id}" value="${s.value}">
                <span>${s.label}</span>
              </label>
            `).join("")}
          </div>
        </section>
      `).join("");

      quiz.addEventListener("change", updateProgress);
      updateProgress();
    }

    function updateProgress() {
      const count = questions.filter(q => document.querySelector(`input[name="q${q.id}"]:checked`)).length;
      answered.textContent = count;
      bar.style.width = `${(count / questions.length) * 100}%`;
      if (count < questions.length) resultBox.style.display = "none";
    }

    function compute() {
      let scores = { alcohol: 0, speed: 0, purpose: 0, control: 0 };
      for (const q of questions) {
        const picked = document.querySelector(`input[name="q${q.id}"]:checked`);
        if (!picked) return null;
        scores[q.axis] += Number(picked.value) * q.dir;
      }
      return scores;
    }

    function axisLetter(score, pos, neg) {
      return score >= 0 ? pos : neg;
    }

    function buildResult(scores) {
      const A = axisLetter(scores.alcohol, "H", "L");
      const S = axisLetter(scores.speed, "F", "S");
      const P = axisLetter(scores.purpose, "D", "V");
      const C = axisLetter(scores.control, "J", "M");
      const code = `${A}${S}${P}${C}`;

      const labels = {
        H: "High 고도수 선호", L: "Low 저도수 선호",
        F: "Fast 빠른 템포", S: "Slow 느린 템포",
        D: "Drink 취기 중심", V: "Vibe 분위기 중심",
        J: "J 지성 조절형", M: "M 무지성 흐름형"
      };

      const lineMap = {
        H: "독한 술도 비교적 부담 없이 가는 편",
        L: "가볍고 편한 술을 더 선호하는 편",
        F: "술자리 템포가 빠를수록 신나는 편",
        S: "천천히 마시며 오래 가는 편",
        D: "분위기보다 취기 자체가 중요한 편",
        V: "술보다 분위기와 사람을 더 보는 편",
        J: "선 넘기 전에 멈출 줄 아는 편",
        M: "흐름 타면 브레이크가 잘 안 걸리는 편"
      };

      const oneline = `${lineMap[A]} · ${lineMap[S]} · ${lineMap[P]} · ${lineMap[C]}`;

      return {
        code,
        oneline,
        a1: `${A} · ${labels[A]}`,
        a2: `${S} · ${labels[S]}`,
        a3: `${P} · ${labels[P]}`,
        a4: `${C} · ${labels[C]}`,
        detail:
`${code} 유형 요약
- ${A === "H" ? "도수 높은 술이나 확실한 취기를 선호하는 타입" : "부담 적은 술과 편한 흐름을 선호하는 타입"}
- ${S === "F" ? "잔이 돌면 템포가 빠르게 붙는 타입" : "속도를 무리하게 올리지 않고 천천히 가는 타입"}
- ${P === "D" ? "술자리의 핵심을 취기와 알코올 자체에서 찾는 타입" : "술보다 대화, 분위기, 감정선을 더 중요하게 보는 타입"}
- ${C === "J" ? "자기 페이스를 비교적 잘 지키는 타입" : "계획보다 분위기에 몸을 맡기는 타입"}

한 줄 평
${code}는 ${A === "H" ? "확실한 맛과 취기" : "편안한 술자리"}를 ${S === "F" ? "빠르게" : "천천히"} 즐기면서, ${P === "D" ? "술 자체의 재미" : "분위기의 재미"}를 중시하고, ${C === "J" ? "적당한 선을 지키려는" : "흐름 따라 가버리는"} 스타일이야.`,
        footer: `점수 | 도수 ${scores.alcohol}, 속도 ${scores.speed}, 목적 ${scores.purpose}, 조절 ${scores.control}`
      };
    }

    document.getElementById("calcBtn").addEventListener("click", () => {
      const scores = compute();
      if (!scores) {
        warn.style.display = "block";
        resultBox.style.display = "none";
        return;
      }
      warn.style.display = "none";
      const r = buildResult(scores);
      document.getElementById("typeCode").textContent = r.code;
      document.getElementById("oneLine").textContent = r.oneline;
      document.getElementById("axis1").textContent = r.a1;
      document.getElementById("axis2").textContent = r.a2;
      document.getElementById("axis3").textContent = r.a3;
      document.getElementById("axis4").textContent = r.a4;
      document.getElementById("detailDesc").textContent = r.detail;
      document.getElementById("scoreFooter").textContent = r.footer;
      resultBox.style.display = "block";
      resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);
      warn.style.display = "none";
      resultBox.style.display = "none";
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      const code = document.getElementById("typeCode").textContent;
      const text = resultBox.style.display === "block"
        ? `내 술BTI는 ${code}\n${document.getElementById("oneLine").textContent}`
        : `술BTI 검사 해봐 🍻`;
      try {
        await navigator.clipboard.writeText(text);
        alert("복사했어!");
      } catch {
        alert("복사는 브라우저 환경에 따라 제한될 수 있어.");
      }
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      const code = document.getElementById("typeCode").textContent;
      const text = resultBox.style.display === "block"
        ? `내 술BTI는 ${code} 🍻`
        : `술BTI 검사 해봐 🍻`;
      if (navigator.share) {
        try {
          await navigator.share({ title: "술BTI 검사", text });
        } catch (e) {}
      } else {
        alert("이 브라우저에서는 기본 공유 기능이 제한될 수 있어.");
      }
    });

    render();
  </script>
</body>
</html>
